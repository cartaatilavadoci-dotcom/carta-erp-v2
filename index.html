<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Carta ERP - Sustav za upravljanje proizvodnjom i HR">
  <title>Carta ERP</title>

  <!-- ============================================
       THEME BOOT SCRIPT — primjeni temu PRIJE CSS-a (no FOUC)
       Mora biti inline + sync, prije <link rel="stylesheet">.
       Validira da je vrijednost iz {dark, light, sage}.
       ============================================ -->
  <script>
    (function() {
      try {
        var allowed = ['dark', 'light', 'sage'];
        var t = localStorage.getItem('carta_theme');
        if (allowed.indexOf(t) === -1) t = 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();

    // Globalni helper za promjenu teme (poziva ga theme switcher u Postavkama)
    window.setTheme = function(name) {
      var allowed = ['dark', 'light', 'sage'];
      if (allowed.indexOf(name) === -1) name = 'dark';
      document.documentElement.setAttribute('data-theme', name);
      try { localStorage.setItem('carta_theme', name); } catch (e) {}
      // Update theme-color meta za PWA status bar
      var themeColors = { dark: '#000510', light: '#f5f7fa', sage: '#4a5550' };
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', themeColors[name] || themeColors.dark);
      // Custom event ako neka komponenta želi reagirati
      window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: name } }));
    };
    window.getTheme = function() {
      return document.documentElement.getAttribute('data-theme') || 'dark';
    };
  </script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/icons.css">

  <!-- Favicon (mali plavi 'C' u krugu) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23001a3a' stroke='%236aacee' stroke-width='2'/%3E%3Cpath d='M21 11a8 8 0 1 0 0 10' fill='none' stroke='%236aacee' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">

  <!-- PWA -->
  <meta name="theme-color" content="#000510">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div class="app-container">

    <!-- TOP HEADER -->
    <header class="top-header" id="topHeader">
      <div class="top-header-left">
        <div class="top-header-logo">
          <img src="carta-logotip.png" alt="Carta" class="carta-logo-img">
        </div>
      </div>
      <div class="top-header-center" id="topHeaderTitle"></div>
      <div class="top-header-right">
        <button class="icon-btn" id="btnNotif" onclick="Notifications.toggle()" title="Obavijesti">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          <span id="notifBadge" style="display: none; position: absolute; top: -4px; right: -4px; background: var(--danger); color: #fff; border-radius: 9px; min-width: 16px; height: 16px; padding: 0 4px; font-size: 10px; font-weight: 700; line-height: 16px; text-align: center; box-shadow: 0 0 0 2px #000;">0</span>
        </button>
        <button class="icon-btn" id="btnChangePassword" onclick="otvoriPromjenuLozinkeGlobal()" title="Promijeni lozinku" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </button>
        <button class="icon-btn" onclick="Auth.logout()" title="Odjava">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
        <div class="user-avatar" id="topUserAvatar">—</div>
      </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <!-- Hidden — logo je u top header-u -->
      </div>

      <nav class="sidebar-menu" id="sidebarMenu">
        <!-- Populated by buildSidebar() in js/utils.js -->
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <span class="user-name" id="userName">-</span>
          <span class="user-role" id="userRole">-</span>
        </div>
      </div>
    </aside>

    <!-- Notifikacije panel -->
    <div id="notifPanel" style="display:none; position: fixed; top: calc(var(--top-header-h) + 8px); right: 14px; width: 360px; max-height: 500px; border-radius: 12px; z-index: 1000; overflow: hidden;">
      <div style="padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;">
        <strong style="font-size: 13px; letter-spacing: 0.4px;">Obavijesti</strong>
        <div style="display: flex; gap: 8px;">
          <button onclick="Notifications.markAllRead()" title="Označi sve kao pročitano" style="background: none; border: none; cursor: pointer; font-size: 11.5px; color: var(--blue);">✓ Sve</button>
          <button onclick="Notifications.toggle(false)" title="Zatvori" style="background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-mid); line-height: 1;">×</button>
        </div>
      </div>
      <div id="notifList" style="max-height: 440px; overflow-y: auto;">
        <div style="padding: 20px; text-align: center; color: var(--text-lo);">Učitavanje...</div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <!-- Mobile Header (hidden on desktop) -->
      <div class="mobile-header" id="mobileHeader" style="display:none;">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <span style="display:flex; align-items:center; gap:6px;">
          <img src="carta-logotip.png" alt="Carta" style="height:18px; filter: var(--t-logo-filter);">
          <strong style="font-size: 12px;">Carta ERP</strong>
        </span>
        <div style="display:flex; gap:4px;">
          <button class="icon-btn" id="btnChangePasswordMobile" onclick="otvoriPromjenuLozinkeGlobal()" title="Promijeni lozinku" style="display:none; width:28px; height:28px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </button>
          <button class="icon-btn" onclick="Auth.logout()" style="width:28px; height:28px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>

      <!-- App Content Container -->
      <div id="app-content">
        <!-- Views loaded here -->
      </div>
    </main>
  </div>

  <!-- MODAL: Promjena lozinke (globalni) -->
  <div id="globalPasswordModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h3>Promjena lozinke</h3>
        <button class="modal-close" onclick="closeModal('globalPasswordModal')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Trenutna lozinka *</label>
          <input type="password" id="globalCurrentPassword" class="form-control" placeholder="Unesite trenutnu lozinku">
        </div>
        <div class="form-group">
          <label>Nova lozinka *</label>
          <input type="password" id="globalNewPassword" class="form-control" placeholder="Unesite novu lozinku">
        </div>
        <div class="form-group">
          <label>Potvrdite novu lozinku *</label>
          <input type="password" id="globalConfirmPassword" class="form-control" placeholder="Ponovite novu lozinku">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('globalPasswordModal')">Odustani</button>
        <button class="btn btn-primary" onclick="spremiGlobalnuLozinku()">Spremi</button>
      </div>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Chart.js (za dashboard glass grafove) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- jsPDF + autoTable za PDF generiranje -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/supabase-helpers.js"></script>
  <script src="js/roll-consumption.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/tuber-fifo.js"></script>
  <script src="js/mobile.js"></script>
  <script src="js/scanner.js"></script>

  <!-- CARTA AI Widget -->
  <script src="js/carta-ai-widget.js"></script>

  <script>
    // Mobile sidebar toggle
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    // Check if mobile
    function checkMobile() {
      const isMobile = window.innerWidth <= 768;
      document.getElementById('mobileHeader').style.display = isMobile ? 'flex' : 'none';
      if (!isMobile) {
        document.getElementById('sidebar').classList.remove('open');
      }
    }

    window.addEventListener('resize', checkMobile);

    // Update top header center title from active route hash
    function updateTopHeaderTitle() {
      const el = document.getElementById('topHeaderTitle');
      if (!el) return;
      const hash = (location.hash || '#dashboard').replace('#', '');
      try {
        const item = (CONFIG.NAV_ITEMS || []).find(i => i.id === hash);
        el.textContent = item ? item.label : '';
      } catch (e) { el.textContent = ''; }
    }
    window.addEventListener('hashchange', updateTopHeaderTitle);

    // Update top user avatar initials
    window.updateTopUserAvatar = function() {
      try {
        const user = (typeof Auth !== 'undefined' && Auth.getUser) ? Auth.getUser() : null;
        if (!user) return;
        const ime = user.name || user.ime || user.email || 'U';
        const parts = String(ime).trim().split(/\s+/);
        const initials = parts.length >= 2
          ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
          : parts[0].slice(0, 2).toUpperCase();
        const el = document.getElementById('topUserAvatar');
        if (el) el.textContent = initials;
      } catch (e) { /* ignore */ }
    };

    // ============================================
    // GLOBALNA PROMJENA LOZINKE
    // ============================================
    function otvoriPromjenuLozinkeGlobal() {
      document.getElementById('globalCurrentPassword').value = '';
      document.getElementById('globalNewPassword').value = '';
      document.getElementById('globalConfirmPassword').value = '';
      openModal('globalPasswordModal');
    }

    async function spremiGlobalnuLozinku() {
      var current = document.getElementById('globalCurrentPassword').value;
      var newPass = document.getElementById('globalNewPassword').value;
      var confirm = document.getElementById('globalConfirmPassword').value;

      if (!current || !newPass || !confirm) {
        showMessage('Popunite sva polja', 'warning');
        return;
      }

      if (newPass !== confirm) {
        showMessage('Nove lozinke se ne podudaraju', 'warning');
        return;
      }

      if (newPass.length < 4) {
        showMessage('Lozinka mora imati najmanje 4 znaka', 'warning');
        return;
      }

      showLoading('Spremanje...');

      try {
        await Auth.changePassword(current, newPass);
        showMessage('Lozinka uspješno promijenjena!', 'success');
        closeModal('globalPasswordModal');
      } catch (e) {
        showMessage(e.message, 'error');
      } finally {
        hideLoading();
      }
    }

    // Initialize app
    document.addEventListener('DOMContentLoaded', () => {
      checkMobile();
      updateTopHeaderTitle();
      initApp();
    });
  </script>
</body>
</html>
