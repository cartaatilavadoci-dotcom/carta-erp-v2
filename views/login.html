<div class="login-container">
  <!-- Login Box -->
  <div class="login-box" id="loginBox">
    <div class="login-logo">
      <img src="carta-logotip.png" alt="Carta">
    </div>
    <h1 class="login-title">Carta ERP</h1>
    <p class="login-subtitle" style="margin-bottom: 24px;">Sustav za upravljanje proizvodnjom</p>

    <!-- Tabs za tip prijave -->
    <!-- NAPOMENA: ne koristiti inline <svg> (Pravilo 25) — Live Server lomi fragment.
         Koristim .svg-icon klase iz css/icons.css (mask-image, currentColor). -->
    <div class="login-tabs">
      <button class="login-tab active" id="tabPin" onclick="switchLoginTab('pin')">
        <span class="svg-icon svg-icon-target svg-icon-xs" style="margin-right:6px;"></span>
        PIN
      </button>
      <button class="login-tab" id="tabPassword" onclick="switchLoginTab('password')">
        <span class="svg-icon svg-icon-shield-check svg-icon-xs" style="margin-right:6px;"></span>
        Admin
      </button>
    </div>

    <!-- PIN Login Form -->
    <div id="pinLoginForm">
      <p class="login-subtitle">Unesite vaš 4-znamenkasti PIN</p>

      <div class="pin-input-container">
        <input type="password" class="pin-input" maxlength="1" data-index="0" inputmode="numeric">
        <input type="password" class="pin-input" maxlength="1" data-index="1" inputmode="numeric">
        <input type="password" class="pin-input" maxlength="1" data-index="2" inputmode="numeric">
        <input type="password" class="pin-input" maxlength="1" data-index="3" inputmode="numeric">
      </div>

      <div id="loginError" class="login-error"></div>
      <div id="attemptWarning" class="attempt-warning"></div>

      <button class="btn btn-primary btn-block btn-lg" onclick="handlePinLogin()">
        Prijava
      </button>
    </div>

    <!-- Password Login Form (Admin/Superadmin) -->
    <div id="passwordLoginForm" style="display: none;">
      <p class="login-subtitle">Prijava za administratore</p>

      <div class="form-group" style="text-align:left;">
        <label>Email</label>
        <input type="email" id="adminEmail" class="form-control" placeholder="admin@carta.hr" autocomplete="email">
      </div>

      <div class="form-group" style="text-align:left;">
        <label>Lozinka</label>
        <div class="password-input-wrapper">
          <input type="password" id="adminPassword" class="form-control" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility()" title="Prikaži/sakrij lozinku">
            <span class="svg-icon svg-icon-eye svg-icon-sm"></span>
          </button>
        </div>
      </div>

      <div id="passwordError" class="login-error"></div>

      <button class="btn btn-primary btn-block btn-lg" onclick="handlePasswordLogin()">
        Prijava
      </button>
    </div>
  </div>

  <!-- Blocked Box -->
  <div class="login-box blocked-box" id="blockedBox" style="display: none;">
    <div class="login-logo" style="background: rgba(176,126,138,0.10); border-color: rgba(176,126,138,0.40); box-shadow: 0 0 14px rgba(176,126,138,0.28);">
      <span class="svg-icon svg-icon-shield-check svg-icon-xl" style="color: var(--danger);"></span>
    </div>
    <h1 class="login-title" style="color: var(--danger);">Pristup blokiran</h1>
    <p class="login-subtitle">Previše neuspjelih pokušaja.<br>Potrebna autorizacija administratora.</p>

    <div class="blocked-info">
      <div>Blokirano: <span id="blockedTime"></span></div>
      <div>Pokušaja: <span id="blockedAttempts">3</span></div>
    </div>

    <p style="margin-top: 20px; color: var(--text-mid); font-size: 0.9em;">
      Admin lozinka za odblokiravanje:
    </p>

    <div class="form-group" style="text-align:left;">
      <input type="email" id="unblockEmail" class="form-control" placeholder="Admin email">
    </div>
    <div class="form-group" style="text-align:left;">
      <input type="password" id="unblockPassword" class="form-control" placeholder="Admin lozinka">
    </div>

    <div id="adminError" class="login-error"></div>

    <button class="btn btn-primary btn-block btn-lg" onclick="handleAdminUnlock()">
      Odblokiraj
    </button>
  </div>
</div>

<style>
  /* Login-specifični overrides — globalna .login-* pravila u css/styles.css */
  .login-error {
    color: var(--danger);
    margin-bottom: 14px;
    display: none;
    font-size: 0.85em;
    padding: 8px 12px;
    background: rgba(176, 126, 138, 0.10);
    border: 1px solid rgba(176, 126, 138, 0.30);
    border-radius: 8px;
  }
  .attempt-warning {
    color: var(--warning);
    margin-bottom: 14px;
    font-size: 0.82em;
    display: none;
    padding: 8px 12px;
    background: rgba(233, 181, 102, 0.10);
    border: 1px solid rgba(233, 181, 102, 0.30);
    border-radius: 8px;
  }
  .blocked-box {
    border-color: rgba(176, 126, 138, 0.45) !important;
    box-shadow: var(--shadow-lg), 0 0 60px rgba(120, 30, 40, 0.4) !important;
  }
  .blocked-info {
    background: rgba(176, 126, 138, 0.12);
    border: 1px solid rgba(176, 126, 138, 0.30);
    padding: 12px 14px;
    border-radius: 8px;
    margin: 18px 0;
    color: var(--danger);
    font-size: 0.88em;
  }
  .blocked-info div {
    margin: 4px 0;
    display: flex;
    justify-content: space-between;
  }

  /* Login Tabs — pill-segmented control u glass style */
  .login-tabs {
    display: flex;
    margin-bottom: 22px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--glass-border-strong);
    background: rgba(0, 5, 18, 0.40);
    padding: 3px;
    gap: 3px;
  }
  .login-tab {
    flex: 1;
    padding: 10px 12px;
    border: none;
    background: transparent;
    color: var(--text-mid);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    border-radius: 7px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    letter-spacing: 0.3px;
  }
  .login-tab:hover {
    color: var(--text-hi);
    background: rgba(70, 130, 220, 0.08);
  }
  .login-tab.active {
    background: linear-gradient(135deg, rgba(106, 172, 238, 0.20) 0%, rgba(70, 130, 220, 0.30) 100%);
    color: var(--blue-bright);
    box-shadow: 0 0 12px rgba(106, 172, 238, 0.20);
  }

  /* Password Input wrapper */
  .password-input-wrapper {
    position: relative;
  }
  .password-input-wrapper input {
    padding-right: 42px;
  }
  .password-toggle {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-lo);
    padding: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
  }
  .password-toggle:hover {
    color: var(--blue);
  }
</style>

<script>
  var LOCKOUT_KEY = 'carta_login_lockout';
  var MAX_ATTEMPTS = 3;
  var failedAttempts = 0;
  var currentLoginType = 'pin';

  // Switch between PIN and Password login
  function switchLoginTab(type) {
    currentLoginType = type;
    
    document.getElementById('tabPin').classList.toggle('active', type === 'pin');
    document.getElementById('tabPassword').classList.toggle('active', type === 'password');
    
    document.getElementById('pinLoginForm').style.display = type === 'pin' ? 'block' : 'none';
    document.getElementById('passwordLoginForm').style.display = type === 'password' ? 'block' : 'none';
    
    // Focus appropriate field
    if (type === 'pin') {
      document.querySelector('.pin-input').focus();
    } else {
      document.getElementById('adminEmail').focus();
    }
  }

  // Toggle password visibility
  function togglePasswordVisibility() {
    var input = document.getElementById('adminPassword');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  // Check lockout on load
  function checkLockout() {
    var lockout = localStorage.getItem(LOCKOUT_KEY);
    if (lockout) {
      var data = JSON.parse(lockout);
      showBlockedScreen(data);
      return true;
    }
    return false;
  }

  function showBlockedScreen(data) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('blockedBox').style.display = 'block';
    document.getElementById('blockedTime').textContent = new Date(data.time).toLocaleString('hr-HR');
    document.getElementById('blockedAttempts').textContent = data.attempts;
    document.getElementById('unblockEmail').focus();
  }

  function showLoginScreen() {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('blockedBox').style.display = 'none';
    failedAttempts = 0;
    updateAttemptWarning();
    clearPinInputs();
  }

  function lockAccount() {
    var data = {
      time: new Date().toISOString(),
      attempts: failedAttempts
    };
    localStorage.setItem(LOCKOUT_KEY, JSON.stringify(data));
    showBlockedScreen(data);
  }

  function unlockAccount() {
    localStorage.removeItem(LOCKOUT_KEY);
    showLoginScreen();
  }

  function updateAttemptWarning() {
    var warning = document.getElementById('attemptWarning');
    if (failedAttempts > 0 && failedAttempts < MAX_ATTEMPTS) {
      warning.style.display = 'block';
      var remaining = MAX_ATTEMPTS - failedAttempts;
      warning.textContent = '⚠️ Preostalo pokušaja: ' + remaining;
    } else {
      warning.style.display = 'none';
    }
  }

  // Setup PIN inputs
  function setupPinInputs(inputs, submitCallback) {
    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const value = e.target.value;
        if (value.length === 1 && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
        if (index === inputs.length - 1 && value.length === 1) {
          submitCallback();
        }
      });
      
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          inputs[index - 1].focus();
        }
      });
      
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const paste = (e.clipboardData || window.clipboardData).getData('text');
        const digits = paste.replace(/\D/g, '').slice(0, 4);
        digits.split('').forEach((digit, i) => {
          if (inputs[i]) inputs[i].value = digit;
        });
        if (digits.length === 4) submitCallback();
      });
    });
  }

  // PIN input handling
  const pinInputs = document.querySelectorAll('#pinLoginForm .pin-input');
  setupPinInputs(pinInputs, handlePinLogin);
  
  // Password form Enter key
  document.getElementById('adminPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handlePasswordLogin();
  });
  document.getElementById('adminEmail').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('adminPassword').focus();
  });
  
  // Check lockout first
  if (!checkLockout()) {
    pinInputs[0].focus();
  }
  
  // ============================================
  // PIN LOGIN (za obične korisnike)
  // ============================================
  async function handlePinLogin() {
    const pin = Array.from(pinInputs).map(input => input.value).join('');
    
    if (pin.length !== 4) {
      showLoginError('Unesite 4 znamenke');
      return;
    }
    
    showLoading('Prijava...');
    
    try {
      await Auth.loginWithPin(pin);
      hideLoading();
      
      failedAttempts = 0;
      localStorage.removeItem(LOCKOUT_KEY);
      
      buildSidebar();
      showMessage('Dobrodošli!', 'success');
      Router.navigate('dashboard');
      
    } catch (error) {
      hideLoading();
      console.error('Login error:', error);
      
      failedAttempts++;
      
      if (failedAttempts >= MAX_ATTEMPTS) {
        lockAccount();
      } else {
        showLoginError('Neispravan PIN');
        updateAttemptWarning();
        clearPinInputs();
      }
    }
  }

  // ============================================
  // PASSWORD LOGIN (za admin/superadmin)
  // ============================================
  async function handlePasswordLogin() {
    var email = document.getElementById('adminEmail').value.trim();
    var password = document.getElementById('adminPassword').value;
    
    if (!email || !password) {
      showPasswordError('Unesite email i lozinku');
      return;
    }
    
    showLoading('Prijava...');
    
    try {
      await Auth.loginWithPassword(email, password);
      hideLoading();
      
      buildSidebar();
      showMessage('Dobrodošli!', 'success');
      Router.navigate('dashboard');
      
    } catch (error) {
      hideLoading();
      console.error('Password login error:', error);
      showPasswordError(error.message || 'Neispravni podaci');
    }
  }

  // ============================================
  // ADMIN UNLOCK
  // ============================================
  async function handleAdminUnlock() {
    var email = document.getElementById('unblockEmail').value.trim();
    var password = document.getElementById('unblockPassword').value;
    
    if (!email || !password) {
      showAdminError('Unesite email i lozinku');
      return;
    }
    
    showLoading('Provjera...');
    
    try {
      const { data, error } = await initSupabase()
        .from('prod_users')
        .select('id, ime, uloga, password')
        .eq('email', email)
        .eq('aktivan', true)
        .single();
      
      hideLoading();
      
      if (error || !data) {
        showAdminError('Korisnik nije pronađen');
        return;
      }
      
      // Check password
      if (data.password !== password) {
        showAdminError('Neispravna lozinka');
        return;
      }
      
      // Check if admin or superadmin
      if (data.uloga === 'admin' || data.uloga === 'superadmin') {
        showMessage('Odblokirano od: ' + data.ime, 'success');
        unlockAccount();
      } else {
        showAdminError('Potreban admin pristup');
      }
      
    } catch (error) {
      hideLoading();
      console.error('Admin unlock error:', error);
      showAdminError('Greška pri provjeri');
    }
  }
  
  function showLoginError(message) {
    const errorEl = document.getElementById('loginError');
    errorEl.textContent = message;
    errorEl.style.display = 'block';
    setTimeout(() => errorEl.style.display = 'none', 3000);
  }

  function showPasswordError(message) {
    const errorEl = document.getElementById('passwordError');
    errorEl.textContent = message;
    errorEl.style.display = 'block';
    setTimeout(() => errorEl.style.display = 'none', 3000);
  }

  function showAdminError(message) {
    const errorEl = document.getElementById('adminError');
    errorEl.textContent = message;
    errorEl.style.display = 'block';
    setTimeout(() => errorEl.style.display = 'none', 3000);
  }
  
  function clearPinInputs() {
    pinInputs.forEach(input => input.value = '');
    pinInputs[0].focus();
  }
</script>
